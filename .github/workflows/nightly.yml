name: Nightly Tests

on:
  schedule:
    - cron: '0 3 * * *'  # 03:00 UTC daily (00:00 BRT, UTC-3)
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint-and-quality:
    name: 🔍 Lint & Code Quality
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install lint dependencies
        run: pip install flake8 pylint black isort

      - name: Flake8
        run: flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Black
        run: black --check src/ --line-length 100
        continue-on-error: true

      - name: isort
        run: isort --check-only src/ --profile black
        continue-on-error: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint src/ --ext .js,.jsx --max-warnings 50
        continue-on-error: true

  backend-tests:
    name: 🐍 Backend Tests
    runs-on: ubuntu-latest
    needs: lint-and-quality
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      LLM_PROVIDER: "gemini"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov pytest-html

      - name: Create result directories
        run: mkdir -p test-results/backend test-results/performance

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Unit tests
        run: |
          python -m pytest tests/backend/unit \
            -v --tb=short \
            --junit-xml=test-results/backend/unit-results.xml \
            -q

      - name: API tests
        run: |
          python -m pytest tests/backend/api \
            -v --tb=short \
            --junit-xml=test-results/backend/api-results.xml \
            -q

      - name: Security tests
        run: |
          python -m pytest tests/backend/security \
            -v --tb=short -m security \
            --junit-xml=test-results/backend/security-results.xml \
            -q

      - name: Integration tests
        run: |
          python -m pytest tests/backend/integration \
            -v --tb=short \
            --junit-xml=test-results/backend/integration-results.xml \
            -q

      - name: E2E tests
        run: |
          python -m pytest tests/backend/e2e \
            -v --tb=short \
            --junit-xml=test-results/backend/e2e-results.xml \
            -q
        continue-on-error: true

      - name: Performance benchmarks
        run: |
          python -m pytest tests/backend/performance/test_performance_benchmarks.py \
            -v --tb=short \
            --junit-xml=test-results/backend/performance-results.xml \
            -q
        continue-on-error: true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-backend-test-results
          path: test-results/backend/
          retention-days: 30

  frontend-tests:
    name: ⚛️ Frontend Tests
    runs-on: ubuntu-latest
    needs: lint-and-quality
    timeout-minutes: 15
    permissions:
      contents: read
    env:
      CI: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('frontend/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install frontend dependencies
        run: cd frontend && npm ci

      - name: Tests with coverage
        env:
          CI: true
        run: |
          cd frontend && npm run test:coverage -- \
            --watchAll=false \
            --ci \
            --reporters=default \
            --coverageReporters=lcov \
            --coverageReporters=text-summary \
            --coverageReporters=cobertura \
            --coverageDirectory=../test-results/frontend/coverage

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-frontend-coverage-report
          path: test-results/frontend/coverage/
          retention-days: 30

      - name: Frontend security tests
        run: |
          cd frontend && npx craco test \
            --testPathPattern="tests/frontend/security" \
            --watchAll=false \
            --ci

  production-sla:
    name: 📈 Production SLA Tests
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend-tests]
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      LLM_PROVIDER: "gemini"
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$GITHUB_WORKSPACE/src:$GITHUB_WORKSPACE" >> $GITHUB_ENV

      - name: Create result directories
        run: mkdir -p test-results

      - name: Production SLA tests
        run: |
          RUN_PRODUCTION_TESTS=true python -m pytest \
            tests/backend/performance/test_sla_production.py \
            -v --tb=short \
            --junit-xml=test-results/production-sla-results.xml

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: nightly-production-sla-results
          path: test-results/production-sla-results.xml
          retention-days: 30

  notify-failure:
    name: 🔔 Notify on Failure
    runs-on: ubuntu-latest
    needs: [lint-and-quality, backend-tests, frontend-tests, production-sla]
    if: failure()
    permissions:
      issues: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔴 Nightly Tests Failed - ${new Date().toISOString().split('T')[0]}`,
              body: `## Falha nos Testes Noturnos\n\n**Workflow**: ${context.workflow}\n**Run**: ${context.runId}\n\n[Ver detalhes](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})\n\n### Próximos passos\n- [ ] Verificar logs do run\n- [ ] Identificar causa raiz\n- [ ] Abrir PR com fix`,
              labels: ['bug', 'ci-failure', 'automated']
            });
            console.log(`Issue criada: ${issue.html_url}`);
